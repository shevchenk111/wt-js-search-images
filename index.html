<!DOCTYPE html>
<html lang="uk">
  <head>
    <link rel="stylesheet" href="./css/styles.css" />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css"
/>
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/simplelightbox/dist/simple-lightbox.min.css"
/>
  </head>

  <body>
    <header class="header">
      <h1 class="title">Пошук зображень</h1>

      <form class="search-form">
        <input
          id="search-bar"
          type="text"
          name="searchQuery"
          autocomplete="off"
          placeholder="Що шукаємо?"
        />
        <button type="submit" id="search-button" aria-label="Пошук">
          <img
            class="search-icon"
            src="./images/search-glass.svg"
            alt="search"
            width="24"
            height="24"
          />
        </button>
      </form>
    </header>

    <main>
      <div class="gallery" aria-live="polite"></div>

      <nav class="pagination-container is-hidden" id="pagination-container">
        <button
          class="pagination-button"
          id="prev-button"
          title="Previous page"
          aria-label="Previous page"
        >
          &lt;
        </button>

        <div id="pagination-numbers"></div>

        <button
          class="pagination-button"
          id="next-button"
          title="Next page"
          aria-label="Next page"
        >
          &gt;
        </button>
      </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simplelightbox/dist/simple-lightbox.min.js"></script>
<script src="./js/api.js"></script>
<script src="./js/pagination.js"></script>
  </body>
</html>
